name: 'audit-risk'
description: 'AI 编码风控：在 PR 合并前检测高风险 AI 生成代码，输出结构化风险报告'
author: 'audit-risk'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  workspace:
    description: '要扫描的工作区目录'
    required: false
    default: '.'
  fail-on:
    description: '触发失败的最低风险等级：allow / warn / require_approval / block'
    required: false
    default: 'require_approval'
  version:
    description: 'audit-risk 版本，默认使用最新 release'
    required: false
    default: 'latest'
  comment-on-pr:
    description: '是否在 PR 上发布风险报告评论'
    required: false
    default: 'true'
  files-from:
    description: '可选清单文件路径（相对 checkout 根目录或绝对路径）；内容为 NUL 分隔的工作区相对路径'
    required: false
    default: ''

outputs:
  gate-decision:
    description: '最终门禁决定：allow / warn / require_approval / block'
    value: ${{ steps.scan.outputs.gate_decision }}
  finding-count:
    description: '发现的风险数量'
    value: ${{ steps.scan.outputs.finding_count }}
  report-path:
    description: '机器可读 JSON 报告路径'
    value: ${{ steps.scan.outputs.report_path }}
  stderr-path:
    description: '扫描器 stderr 日志路径'
    value: ${{ steps.scan.outputs.stderr_path }}

runs:
  using: 'composite'
  steps:
    - name: Install audit-risk
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        INSTALL_PREFIX="$HOME/.local"
        INSTALLER_PATH="$GITHUB_ACTION_PATH/../../../install.sh"

        if [ "$VERSION" = "latest" ]; then
          sh "$INSTALLER_PATH" "--prefix=$INSTALL_PREFIX" --require-checksum
        else
          sh "$INSTALLER_PATH" "--prefix=$INSTALL_PREFIX" \
            "--version=$VERSION" --require-checksum
        fi
        echo "$INSTALL_PREFIX/bin" >> "$GITHUB_PATH"

    - name: Run audit-risk scan
      id: scan
      shell: bash
      env:
        WORKSPACE: ${{ inputs.workspace }}
        FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FILES_FROM: ${{ inputs.files-from }}
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PUSH_BASE_SHA: ${{ github.event.before }}
        EVENT_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail

        REPORT_PATH="$RUNNER_TEMP/audit-risk-report.json"
        STDERR_PATH="$RUNNER_TEMP/audit-risk-stderr.log"
        FILES_FROM="$INPUT_FILES_FROM"

        if [ -z "$FILES_FROM" ]; then
          BASE_SHA=""
          HEAD_SHA=""
          case "$EVENT_NAME" in
            pull_request)
              BASE_SHA="$PR_BASE_SHA"
              HEAD_SHA="$PR_HEAD_SHA"
              ;;
            push)
              BASE_SHA="$PUSH_BASE_SHA"
              HEAD_SHA="$EVENT_SHA"
              ;;
            *)
              echo "::error::事件 $EVENT_NAME 没有可推导的 base/head；请显式传入 files-from"
              exit 3
              ;;
          esac

          if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
            case "$BASE_SHA$HEAD_SHA" in
              *[!0-9a-fA-F]*)
                echo "::error::base/head SHA 格式无效"
                exit 3
                ;;
            esac
            if ! git -C "$WORKSPACE" cat-file -e "$HEAD_SHA^{commit}"; then
              echo "::error::head commit 不存在：$HEAD_SHA"
              exit 3
            fi
            if [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ] && \
              ! git -C "$WORKSPACE" cat-file -e "$BASE_SHA^{commit}"; then
              echo "::error::base commit 不存在：$BASE_SHA；请确认 checkout 使用 fetch-depth: 0"
              exit 3
            fi
            FILES_FROM="$RUNNER_TEMP/audit-risk-changed-files"
            if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git -C "$WORKSPACE" hash-object -t tree -w /dev/null)"
            fi
            git -C "$WORKSPACE" diff --find-renames --name-only -z --diff-filter=ACMR \
              --relative "$BASE_SHA" "$HEAD_SHA" -- . > "$FILES_FROM"
          fi
        fi

        CHECK_ARGS=(check "$WORKSPACE" --json --fail-on "$FAIL_ON")
        if [ -n "$FILES_FROM" ]; then
          CHECK_ARGS+=(--files-from "$FILES_FROM")
        fi

        set +e
        audit-risk "${CHECK_ARGS[@]}" > "$REPORT_PATH" 2> "$STDERR_PATH"
        EXIT_CODE=$?
        set -e

        PARSE_FAILED=false
        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq 不可用，无法验证 audit-risk JSON 报告合同"
          PARSE_FAILED=true
        elif ! GATE_DECISION="$(jq -er \
          '.review.gate_decision.decision | select(. == "allow" or . == "warn" or . == "require_approval" or . == "block")' \
          "$REPORT_PATH")"; then
          echo "::error::audit-risk 报告缺少有效的 review.gate_decision.decision"
          PARSE_FAILED=true
        elif ! FINDING_COUNT="$(jq -er '.review.findings | arrays | length' "$REPORT_PATH")"; then
          echo "::error::audit-risk 报告缺少 review.findings 数组"
          PARSE_FAILED=true
        fi

        if [ "$PARSE_FAILED" = true ]; then
          GATE_DECISION="unknown"
          FINDING_COUNT="0"
          EXIT_CODE=3
          if [ -s "$STDERR_PATH" ]; then
            echo "::group::audit-risk stderr"
            sed -n '1,200p' "$STDERR_PATH"
            echo "::endgroup::"
          fi
        fi

        echo "gate_decision=$GATE_DECISION" >> "$GITHUB_OUTPUT"
        echo "finding_count=$FINDING_COUNT" >> "$GITHUB_OUTPUT"
        echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
        echo "stderr_path=$STDERR_PATH" >> "$GITHUB_OUTPUT"
        echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

        echo "::notice::gate_decision=$GATE_DECISION, findings=$FINDING_COUNT"

    - name: Upload audit-risk report
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: audit-risk-report
        path: |
          ${{ steps.scan.outputs.report_path }}
          ${{ steps.scan.outputs.stderr_path }}
        if-no-files-found: error

    - name: Post PR comment
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        REPORT_PATH: ${{ steps.scan.outputs.report_path }}
        GATE_DECISION: ${{ steps.scan.outputs.gate_decision }}
        FINDING_COUNT: ${{ steps.scan.outputs.finding_count }}
      with:
        script: |
          const fs = require('fs');
          const reportPath = process.env.REPORT_PATH;
          const gateDecision = process.env.GATE_DECISION;
          const findingCount = parseInt(process.env.FINDING_COUNT || '0');
          const reportValid = gateDecision !== 'unknown';

          const escapeTableCell = (value) => String(value ?? '')
            .replace(/`/g, "'")
            .replace(/\|/g, '\\|')
            .replace(/[\r\n]+/g, ' ');

          // 门禁状态图标
          const gateIcon = {
            'allow': '✅',
            'warn': '⚠️',
            'require_approval': '🔶',
            'block': '🚫',
          }[gateDecision] || '❓';

          const gateLabel = {
            'allow': '通过',
            'warn': '警告',
            'require_approval': '需要审批',
            'block': '已阻断',
          }[gateDecision] || gateDecision;

          let report = null;
          try {
            report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          } catch (e) {
            // report 解析失败，降级到基础输出
          }

          // 构建 PR 评论
          let body = `## ${gateIcon} audit-risk 风险报告\n\n`;
          body += `**门禁决定**：${gateLabel}　**发现风险**：${findingCount} 条\n\n`;

          if (report && report.review && report.review.findings && report.review.findings.length > 0) {
            body += `### 风险详情\n\n`;
            body += `| 级别 | 位置 | 规则 | 说明 |\n`;
            body += `|---|---|---|---|\n`;

            const findings = report.review.findings.slice(0, 20); // 最多显示20条
            for (const f of findings) {
              const severity = escapeTableCell(f.severity || 'unknown');
              const location = f.location?.file_path
                ? `\`${escapeTableCell(f.location.file_path)}${f.location.start_line ? ':' + f.location.start_line : ''}\``
                : '—';
              const rule = escapeTableCell(f.rule_id || '—');
              const explanation = escapeTableCell(
                f.plain_explanation || f.explanation || f.message || ''
              ).slice(0, 80);
              body += `| ${severity} | ${location} | ${rule} | ${explanation} |\n`;
            }

            if (report.review.findings.length > 20) {
              body += `\n> 共 ${report.review.findings.length} 条风险，上方仅显示前 20 条。完整报告见 Actions 产物。\n`;
            }
          } else if (reportValid && gateDecision === 'allow' && findingCount === 0) {
            body += `> 未发现风险，代码通过审查。\n`;
          } else if (!reportValid || !report) {
            body += `> 扫描报告无效或无法解析，本次审查按失败处理。请查看 Actions 产物中的 stderr 日志。\n`;
          }

          if (gateDecision === 'require_approval' || gateDecision === 'block') {
            body += `\n---\n`;
            body += `> **如何处理**：查看上方风险详情，修复或由负责人审批后重新推送。\n`;
            body += `> 本报告由 [audit-risk](https://github.com/290864310liujiasheng-wq/hologram-audit-risk) 自动生成。\n`;
          }

          // 查找已有评论，避免刷屏
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const existing = comments.find(c =>
            c.user.login === 'github-actions[bot]' &&
            c.body.includes('audit-risk 风险报告')
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Set final exit code
      shell: bash
      env:
        AUDIT_RISK_EXIT_CODE: ${{ steps.scan.outputs.exit_code }}
      run: exit "$AUDIT_RISK_EXIT_CODE"
