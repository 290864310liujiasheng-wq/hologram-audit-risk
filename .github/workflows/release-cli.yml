name: Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: audit-risk
            asset_name: audit-risk-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: audit-risk
            asset_name: audit-risk-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: audit-risk
            asset_name: audit-risk-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: audit-risk
            asset_name: audit-risk-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: audit-risk.exe
            asset_name: audit-risk-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-release-${{ matrix.target }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.target }}-

      - name: Install cross (Linux ARM64 cross-compilation)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: '!matrix.cross'
        run: |
          cd engine
          cargo build --release --bin audit-risk --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: |
          cd engine
          cross build --release --bin audit-risk --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp engine/target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
             engine/target/${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "engine/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" `
                    "engine/target/${{ matrix.asset_name }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: engine/target/${{ matrix.asset_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checksums:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" --dir dist

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum audit-risk-* > checksums.txt
          cat checksums.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
