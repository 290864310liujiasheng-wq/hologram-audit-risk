name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-engine-${{ runner.os }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-engine-${{ runner.os }}-

      - name: Build engine
        run: cd engine && cargo build

      - name: Run engine tests
        run: cd engine && cargo test
