name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-engine-${{ runner.os }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-engine-${{ runner.os }}-

      - name: Build engine library
        run: cd engine && cargo build

      - name: Clippy (warnings are errors)
        run: cd engine && cargo clippy --all-targets -- -D warnings

      - name: Run engine tests
        run: cd engine && cargo test

  build-cli:
    name: Build audit-risk CLI binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine/target
          key: cargo-cli-${{ runner.os }}-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: cargo-cli-${{ runner.os }}-

      - name: Build audit-risk release binary
        run: cd engine && cargo build --release --bin audit-risk

      - name: Smoke test binary
        run: |
          set -e
          ./engine/target/release/audit-risk --help
          if ! output="$(./engine/target/release/audit-risk 2>&1)"; then
            echo "smoke test failed: zero-arg invocation exited non-zero"
            echo "$output"
            exit 1
          fi
          echo "$output" | grep -q "audit-risk" || (echo "smoke test failed: expected audit-risk in output"; echo "$output"; exit 1)

  risk-delivery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src-ui/package-lock.json

      - name: Install UI dependencies
        run: npm --prefix src-ui ci

      - name: Export machine-readable risk delivery report
        run: npm --prefix src-ui run phase5:report -- --workspace "$GITHUB_WORKSPACE" --output "$RUNNER_TEMP/phase5-risk-report.json" --fail-on off

      - name: Upload risk delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase5-risk-report
          path: ${{ runner.temp }}/phase5-risk-report.json
