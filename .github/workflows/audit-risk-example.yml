name: audit-risk

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  audit-risk:
    name: AI 代码风险审查
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/audit-risk
        with:
          workspace: '.'
          fail-on: 'require_approval'   # warn / require_approval / block
          comment-on-pr: 'false'   # 本地 Action 随 PR 代码变化，不授予写权限
