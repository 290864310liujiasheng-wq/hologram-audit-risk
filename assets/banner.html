<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=300">
<title>HoloGram Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;500&display=swap');

  :root {
    --void: #030812;
    --signal: #00e5ff;
    --signal-dim: rgba(0,229,255,0.15);
    --anomaly: #ff3d71;
    --sol: #ffd740;
    --nebula: #7c4dff;
    --grid: rgba(0,229,255,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 300px;
    overflow: hidden;
    background: var(--void);
    font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
    position: relative;
  }

  canvas#graph {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .holo-grid {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      linear-gradient(0deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 70%);
  }

  .horizon-line {
    position: absolute;
    top: 62%;
    left: 5%;
    width: 90%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--signal-dim), var(--signal), var(--signal-dim), transparent);
    z-index: 1;
    box-shadow: 0 0 20px var(--signal-dim), 0 0 60px rgba(0,229,255,0.08);
  }

  .title-group {
    position: relative;
    z-index: 3;
    text-align: center;
    margin-top: -8px;
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 0.12em;
    color: transparent;
    background: linear-gradient(180deg,
      rgba(0,229,255,1) 0%,
      rgba(0,229,255,0.85) 25%,
      rgba(124,77,255,0.9) 50%,
      rgba(0,229,255,0.7) 75%,
      rgba(0,229,255,0.3) 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 18px rgba(0,229,255,0.5)) drop-shadow(0 0 40px rgba(124,77,255,0.3));
    line-height: 1;
    animation: title-breathe 4s ease-in-out infinite;
  }

  @keyframes title-breathe {
    0%, 100% { filter: drop-shadow(0 0 18px rgba(0,229,255,0.5)) drop-shadow(0 0 40px rgba(124,77,255,0.3)); }
    50% { filter: drop-shadow(0 0 24px rgba(0,229,255,0.7)) drop-shadow(0 0 55px rgba(124,77,255,0.45)); }
  }

  .subtitle {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.18em;
    color: rgba(0,229,255,0.6);
    margin-top: 4px;
    text-shadow: 0 0 8px rgba(0,229,255,0.2);
  }

  .scanlines {
    position: absolute;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  .vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    box-shadow: inset 0 0 120px 40px var(--void);
  }

  .corner-deco {
    position: absolute;
    z-index: 2;
    pointer-events: none;
  }

  .corner-deco::before,
  .corner-deco::after {
    content: '';
    position: absolute;
    background: var(--signal);
    opacity: 0.25;
  }

  .corner-tl { top: 20px; left: 20px; width: 54px; height: 54px; }
  .corner-tl::before { top: 0; left: 0; width: 100%; height: 1px; box-shadow: 0 0 6px var(--signal); }
  .corner-tl::after  { top: 0; left: 0; width: 1px; height: 100%; box-shadow: 0 0 6px var(--signal); }

  .corner-tr { top: 20px; right: 20px; width: 54px; height: 54px; }
  .corner-tr::before { top: 0; right: 0; width: 100%; height: 1px; box-shadow: 0 0 6px var(--signal); }
  .corner-tr::after  { top: 0; right: 0; width: 1px; height: 100%; box-shadow: 0 0 6px var(--signal); }

  .corner-bl { bottom: 20px; left: 20px; width: 54px; height: 54px; }
  .corner-bl::before { bottom: 0; left: 0; width: 100%; height: 1px; box-shadow: 0 0 6px var(--signal); }
  .corner-bl::after  { bottom: 0; left: 0; width: 1px; height: 100%; box-shadow: 0 0 6px var(--signal); }

  .corner-br { bottom: 20px; right: 20px; width: 54px; height: 54px; }
  .corner-br::before { bottom: 0; right: 0; width: 100%; height: 1px; box-shadow: 0 0 6px var(--signal); }
  .corner-br::after  { bottom: 0; right: 0; width: 1px; height: 100%; box-shadow: 0 0 6px var(--signal); }

  .starfield {
    position: absolute;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 23% 38%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 35% 12%, rgba(0,229,255,0.8), transparent),
      radial-gradient(1px 1px at 48% 55%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 62% 28%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 75% 42%, rgba(124,77,255,0.7), transparent),
      radial-gradient(1px 1px at 88% 18%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 42% 82%, rgba(0,229,255,0.5), transparent),
      radial-gradient(1px 1px at 68% 65%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 92% 75%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 5% 45%, rgba(124,77,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 55% 90%, rgba(0,229,255,0.6), transparent),
      radial-gradient(1px 1px at 80% 8%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.35), transparent);
    animation: drift 20s linear infinite;
  }

  @keyframes drift {
    0% { transform: translateY(0); }
    100% { transform: translateY(-40px); }
  }
</style>
</head>
<body>
  <canvas id="graph"></canvas>
  <div class="starfield"></div>
  <div class="holo-grid"></div>
  <div class="horizon-line"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div class="corner-deco corner-tl"></div>
  <div class="corner-deco corner-tr"></div>
  <div class="corner-deco corner-bl"></div>
  <div class="corner-deco corner-br"></div>

  <div class="overlay">
    <div class="title-group">
      <div class="title">HoloGram</div>
      <div class="subtitle">全息观测站 — 语言无关的交互式代码依赖拓扑图生成器</div>
    </div>
  </div>

  <script>
  const canvas = document.getElementById('graph');
  const ctx = canvas.getContext('2d');
  const W = 1200, H = 300;

  canvas.width = W;
  canvas.height = H;

  const NODES = [];
  const EDGES = [];
  const NUM_NODES = 38;

  // Generate nodes with a bias toward the center (behind the title)
  for (let i = 0; i < NUM_NODES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 80 + Math.random() * 380;
    const cx = W / 2 + Math.cos(angle) * r * (0.6 + Math.random() * 0.8);
    const cy = H / 2 + Math.sin(angle) * r * 0.5 * (0.4 + Math.random() * 1.2);
    const size = 1.2 + Math.random() * 3.2;
    const hue = Math.random() < 0.6 ? 187 : (Math.random() < 0.7 ? 270 : 42);
    const alpha = 0.15 + Math.random() * 0.55;
    NODES.push({
      x: cx, y: cy,
      baseX: cx, baseY: cy,
      size,
      hue,
      alpha,
      phase: Math.random() * Math.PI * 2,
      speed: 0.002 + Math.random() * 0.006
    });
  }

  // Build edges — connect nearby nodes
  for (let i = 0; i < NODES.length; i++) {
    const used = new Set();
    const maxEdges = 1 + Math.floor(Math.random() * 3);
    const candidates = [];
    for (let j = 0; j < NODES.length; j++) {
      if (i === j) continue;
      const dx = NODES[i].baseX - NODES[j].baseX;
      const dy = NODES[i].baseY - NODES[j].baseY;
      candidates.push({ j, dist: Math.sqrt(dx*dx + dy*dy) });
    }
    candidates.sort((a, b) => a.dist - b.dist);
    for (let k = 0; k < Math.min(maxEdges, candidates.length); k++) {
      const j = candidates[k].j;
      const key = Math.min(i, j) + '_' + Math.max(i, j);
      if (!used.has(key)) {
        used.add(key);
        EDGES.push({ a: i, b: j, dist: candidates[k].dist });
      }
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    // Animate nodes
    for (const n of NODES) {
      n.x = n.baseX + Math.sin(t * n.speed + n.phase) * 4;
      n.y = n.baseY + Math.cos(t * n.speed * 1.3 + n.phase) * 3;
    }

    // Edges
    for (const e of EDGES) {
      const a = NODES[e.a], b = NODES[e.b];
      const alpha = Math.max(0.04, 0.2 - e.dist / 1200);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(0,229,255,${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // Edge particles
      const particleT = ((t * 0.0004) % 1 + e.dist * 0.0007) % 1;
      const px = a.x + (b.x - a.x) * particleT;
      const py = a.y + (b.y - a.y) * particleT;
      ctx.beginPath();
      ctx.arc(px, py, 0.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,229,255,${alpha * 2.5})`;
      ctx.fill();
    }

    // Nodes
    for (const n of NODES) {
      // Outer glow
      const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.size * 3);
      glow.addColorStop(0, `hsla(${n.hue}, 80%, 65%, ${n.alpha * 0.5})`);
      glow.addColorStop(0.5, `hsla(${n.hue}, 80%, 65%, ${n.alpha * 0.15})`);
      glow.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Core
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${n.hue}, 60%, 78%, ${n.alpha * 1.6})`;
      ctx.fill();

      // Specular highlight
      ctx.beginPath();
      ctx.arc(n.x - n.size * 0.2, n.y - n.size * 0.2, n.size * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${n.alpha * 0.7})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
  </script>
</body>
</html>
